name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version_prefix:
        description: 'VersionPrefix to release (e.g. 12.0.0)'
        required: true
        type: string
      version_suffix:
        description: 'Optional VersionSuffix to release (e.g. rc2)'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark the GitHub release as prerelease'
        required: false
        default: false
        type: boolean

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-prefix: ${{ steps.version.outputs.version-prefix }}
      version-suffix: ${{ steps.version.outputs.version-suffix }}
      tag-name: ${{ steps.version.outputs.tag-name }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_PREFIX="${{ github.event.inputs.version_prefix }}"
            VERSION_SUFFIX="${{ github.event.inputs.version_suffix }}"
            VERSION="$VERSION_PREFIX"
            if [[ -n "$VERSION_SUFFIX" ]]; then
              VERSION="$VERSION-$VERSION_SUFFIX"
            fi

            if [[ "${{ github.event.inputs.prerelease }}" == "true" || -n "$VERSION_SUFFIX" ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi

            TAG_NAME="$VERSION"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${RAW_TAG#v}"
            VERSION_PREFIX="$VERSION"
            VERSION_SUFFIX=""

            if [[ "$VERSION" == *"-"* ]]; then
              VERSION_PREFIX="${VERSION%%-*}"
              VERSION_SUFFIX="${VERSION#*-}"
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi

            TAG_NAME="$RAW_TAG"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version-prefix=$VERSION_PREFIX" >> "$GITHUB_OUTPUT"
          echo "version-suffix=$VERSION_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "tag-name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "is-prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Building version: $VERSION"
          echo "VersionPrefix: $VERSION_PREFIX"
          echo "VersionSuffix: $VERSION_SUFFIX"
          echo "Tag name: $TAG_NAME"
          echo "Prerelease: $IS_PRERELEASE"

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          dotnet build -c Release --no-restore \
            -p:VersionPrefix="${{ needs.prepare.outputs.version-prefix }}" \
            -p:VersionSuffix="${{ needs.prepare.outputs.version-suffix }}"

  test:
    name: Test Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          dotnet build -c Release --no-restore \
            -p:VersionPrefix="${{ needs.prepare.outputs.version-prefix }}" \
            -p:VersionSuffix="${{ needs.prepare.outputs.version-suffix }}"

      - name: Test
        shell: bash
        run: |
          dotnet test Avalonia.Skia.Lottie.sln -c Release --no-build --no-restore \
            -p:VersionPrefix="${{ needs.prepare.outputs.version-prefix }}" \
            -p:VersionSuffix="${{ needs.prepare.outputs.version-suffix }}"

  pack:
    name: Pack Release
    runs-on: ubuntu-latest
    needs: [prepare, build, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          dotnet build -c Release --no-restore \
            -p:VersionPrefix="${{ needs.prepare.outputs.version-prefix }}" \
            -p:VersionSuffix="${{ needs.prepare.outputs.version-suffix }}"

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts/packages
          for project in src/*/*.csproj; do
            echo "Packing $project..."
            dotnet pack "$project" -c Release --no-build --no-restore -o artifacts/packages \
              -p:VersionPrefix="${{ needs.prepare.outputs.version-prefix }}" \
              -p:VersionSuffix="${{ needs.prepare.outputs.version-suffix }}"
          done

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [pack]
    environment: nuget
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          for package in packages/*.nupkg packages/*.snupkg; do
            echo "Publishing $package..."
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, pack, publish-nuget]
    permissions:
      contents: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Avalonia.Skia.Lottie ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.tag-name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            packages/*.nupkg
            packages/*.snupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
