<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Lottie for Avalonia abstract hero</title>
  <desc id="desc">Minimal hero graphic with a single rounded card and the Lottie project mark.</desc>
  <defs>
    <linearGradient id="g-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7f2" />
      <stop offset="100%" stop-color="#ecfeff" />
    </linearGradient>
    <linearGradient id="g-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a45" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12" />
    </filter>
  </defs>

  <rect width="960" height="560" rx="36" fill="url(#g-bg)" />

  <g filter="url(#shadow)">
    <rect x="186" y="110" width="588" height="340" rx="42" fill="#ffffff" />
  </g>

  <g transform="translate(480 280)">
    <rect x="-132" y="-132" width="264" height="264" rx="68" fill="url(#g-main)" transform="rotate(-12)" />

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-96" y="-96" width="192" height="192" rx="44" stroke="#fff8f3" stroke-width="14" transform="rotate(-12)" opacity=".95" />
      <rect x="-58" y="-58" width="116" height="116" rx="28" stroke="#ddfff8" stroke-width="12" transform="rotate(12)" opacity=".95" />
    </g>

    <circle cx="0" cy="0" r="46" fill="#ffffff" opacity=".2" />
    <path d="M-18 -31L38 0-18 31Z" fill="#fffaf6" />
  </g>
</svg>
